services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: klinik
      POSTGRES_PASSWORD: KlinikMatras2026Aman
      POSTGRES_DB: klinik_matras
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WAHA_GOWS_DEVICE_REQUIRE_FULL_SYNC: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_DAYS_LIMIT: 365
      WAHA_GOWS_DEVICE_HISTORY_SYNC_INITIAL_SYNC_MAX_MESSAGES_PER_CHAT: 500
      WHATSAPP_HOOK_URL: http://backend:4000/api/webhooks/waha
      # message.receipt ditambahkan (Task 2b) berjaga-jaga kalau GOWS pakai
      # nama event berbeda dari message.ack untuk sinkronisasi status baca
      # multi-device (baca di HP) — webhooks.js sudah handle kedua nama event.
      WHATSAPP_HOOK_EVENTS: message,message.any,session.status,message.ack
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: klinikmatras123
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: klinikmatras123
      WAHA_API_KEY: klinikmatras-rahasia-2026
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    ports:
      - "4000:4000"
    volumes:
      - ./frontend/dist:/frontend/dist
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    depends_on:
      - postgres
      - waha

  waha-test:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WAHA_GOWS_DEVICE_REQUIRE_FULL_SYNC: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_DAYS_LIMIT: 365
      WAHA_GOWS_DEVICE_HISTORY_SYNC_INITIAL_SYNC_MAX_MESSAGES_PER_CHAT: 500
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: klinikmatras123
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: klinikmatras123
      WAHA_API_KEY: klinikmatras-rahasia-2026
    ports:
      - "3001:3000"
    volumes:
      - waha_test_sessions:/app/.sessions

volumes:
  pgdata:
  waha_sessions:
  waha_test_sessions:
