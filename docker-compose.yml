version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: klinik
      POSTGRES_PASSWORD: KlinikMatras2026Aman
      POSTGRES_DB: klinik_matras
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # WAHA - WhatsApp HTTP API.
  # WEBJS dipilih karena support PUT /api/contacts (sync nama kontak).
  # NOWEB lebih ringan tapi tidak support endpoint contacts.
  waha:
    image: devlikeapro/waha
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WHATSAPP_HOOK_URL: http://backend:4000/api/webhooks/waha
      WHATSAPP_HOOK_EVENTS: message
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: klinikmatras123
      WHATSAPP_SWAGGER_USERNAME: admin
      WHATSAPP_SWAGGER_PASSWORD: klinikmatras123
      WAHA_API_KEY: klinikmatras-rahasia-2026
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    # Port 4000 tidak perlu diekspos ke publik lagi — Caddy yang jadi pintu masuk via HTTPS.
    # Kalau mau akses langsung pakai IP:4000 (tanpa HTTPS), uncomment baris di bawah:
    # ports:
    #   - "4000:4000"
    volumes:
      - ./frontend/dist:/frontend/dist
      - ./backend/uploads:/app/uploads          # media chat persisten
      - ./backend/data/products:/app/data/products  # foto produk persisten
    depends_on:
      - postgres
      - waha

  # Caddy: HTTPS reverse proxy dengan auto Let's Encrypt
  # Butuh: port 80 + 443 terbuka di firewall VPS, dan DNS A record
  # app.sanomatrassehat.com → IP VPS sudah pointing
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  pgdata:
  waha_sessions:
  caddy_data:
  caddy_config:
