<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover WAJIB utk env(safe-area-inset-*) di CSS berfungsi
         di iPhone X+ (notch/home indicator) — sebelumnya tidak ada, jadi
         padding safe-area yang sudah ditulis di index.css diam-diam TIDAK
         PERNAH aktif di iOS. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <!-- mobile-web-app-capable = standar (Chrome/Android/Brave/Opera, semua
         Chromium). apple-mobile-web-app-capable = WAJIB TERPISAH utk Safari
         iOS — tanpa ini, "Add to Home Screen" tetap buka di dalam Safari
         (address bar dsb kelihatan), bukan mode standalone layar penuh. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Klinik Matras" />
    <script>
      // Capture beforeinstallprompt sebelum React mount supaya tidak terlewat
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallEvent = e;
      });
    </script>
    <title>Klinik Matras - CRM</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
